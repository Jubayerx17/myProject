<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
  <title>Profile Statistics</title>
</head>
<body>
  <div class="container">
    <i class="fa-solid fa-briefcase fa-3x icon"></i>
    <div class="counter" data-ceil="15">15</div>
    <h4>Year Experience</h4>
  </div>
  <div class="container">
    <i class="fa-solid fa-cloud fa-3x icon"></i>
    <div class="counter" data-ceil="15">260</div>
    <h4>Websites Made</h4>
  </div>
  <div class="container">
    <i class="fa-brands fa-apple fa-3x icon"></i>
    <div class="counter" data-ceil="15">27</div>
    <h4>Apps Made</h4>
  </div>


  <script src="script.js"></script>
</body>
</html>
